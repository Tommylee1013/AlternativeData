# Freight indicator catalog
# Each entry maps one indicator_id to one (file, sheet, column) in the Excel data.
# column_index is 0-based within the value columns (i.e., after the 4 standard header cols).

indicators:

  # ── Baltic Dry Index (baltic dry index.xlsx) ─────────────────────
  - indicator_id: BDI
    name: Baltic Dry Index
    file: data/freight/baltic dry index.xlsx
    sheet: BDI
    column_index: 0
    category: freight
    subcategory: shipping
    country: GLOBAL
    frequency: daily
    unit: index
    source: Baltic Exchange
    collection_method: manual_excel
    description: Composite of Capesize, Panamax, Supramax shipping costs

