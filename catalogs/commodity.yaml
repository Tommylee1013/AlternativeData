# Commodity indicator catalog

indicators:

  # ── Gasoline (AAA) ───────────────────────────────────────────────
  - indicator_id: COM_GASOLINE_REGULAR
    name: US Regular Gasoline Price (AAA)
    file: data/commodity/AAA Gasoline.xlsx
    sheet: gasoline
    column_index: 0
    category: commodity
    subcategory: energy
    country: US
    frequency: daily
    unit: usd_per_gallon
    source: AAA
    collection_method: manual_excel

  - indicator_id: COM_GASOLINE_DIESEL
    name: US Diesel Price (AAA)
    file: data/commodity/AAA Gasoline.xlsx
    sheet: gasoline
    column_index: 3
    category: commodity
    subcategory: energy
    country: US
    frequency: daily
    unit: usd_per_gallon
    source: AAA
    collection_method: manual_excel

