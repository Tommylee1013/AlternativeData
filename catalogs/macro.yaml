# Macro indicator catalog
# Most macro files share: Base Date | Release Date | Time | TZ | Actual | Forecast | Previous
# column_index 0 = "Actual" value column

indicators:

  # ── USA ──────────────────────────────────────────────────────────

  - indicator_id: US_CPI_YOY
    name: US CPI Year-over-Year
    file: data/macro/USA/USCPI YoY.xlsx
    sheet: data
    column_index: 0
    category: macro
    subcategory: inflation
    country: US
    frequency: monthly
    unit: pct
    source: BLS
    release_lag_days: 13
    collection_method: manual_excel
    description: US Consumer Price Index, year-over-year change

